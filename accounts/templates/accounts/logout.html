{% extends "base.html" %}
{% block title %}Logout - My Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0"><i class="fas fa-sign-out-alt"></i> Logged Out</h3>
            </div>
            <div class="card-body text-center">
                <h4>You have been successfully logged out!</h4>
                <p class="mt-3">Thank you for visiting. We hope to see you again soon.</p>
                <a href="{% url 'login' %}" class="btn btn-primary mt-3">
                    <i class="fas fa-sign-in-alt"></i> Login Again
                </a>
                <a href="{% url 'blog-home' %}" class="btn btn-secondary mt-3">
                    <i class="fas fa-home"></i> Go to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
