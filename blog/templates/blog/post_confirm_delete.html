{% extends "base.html" %}
{% block title %}Delete Post - My Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0"><i class="fas fa-trash"></i> Delete Post</h3>
            </div>
            <div class="card-body text-center">
                <h4>Are you sure you want to delete "{{ object.title }}"?</h4>
                <p class="text-danger">This action cannot be undone!</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button class="btn btn-danger" type="submit">
                            <i class="fas fa-trash"></i> Yes, Delete
                        </button>
                        <a href="{% url 'blog-post-detail' object.slug %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
